version: '3.8'

services:
  app:
    build: .
    container_name: doxarealm_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:churchsecret123@db:5432/doxarealm_db
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: doxarealm_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: churchsecret123
      POSTGRES_DB: doxarealm_db
    ports:
      - "5432:5432"
    volumes:
      - doxarealm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doxarealm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  doxarealm_pg_data:
