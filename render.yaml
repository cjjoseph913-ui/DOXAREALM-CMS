services:
  - type: web
    name: doxarealm-cms
    env: node
    plan: free
    region: oregon
    buildCommand: "npm install --include=dev --legacy-peer-deps && npm run build"
    startCommand: "chmod +x start.sh && ./start.sh"
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: doxarealm-postgres
          property: connectionString

databases:
  - name: doxarealm-postgres
    plan: free
    region: oregon
    databaseName: doxarealm_db
    user: doxarealm_user
