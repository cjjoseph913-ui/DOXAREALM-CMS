services:
  - type: web
    name: doxarealm-cms
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: doxarealm-postgres
          property: connectionString

databases:
  - name: doxarealm-postgres
    plan: free
    databaseName: doxarealm_db
    user: doxarealm_user
